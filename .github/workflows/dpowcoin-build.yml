#
# Minimal Dpowcoin-specific CI:
#   * builds the daemon, CLI and tx tools on Ubuntu 24.04
#   * exercises the Dual PoW (yespower + chained argon2id) static lib
#   * runs a curated subset of unit tests (excludes upstream Bitcoin
#     retargeting tests that are not applicable to Dpowcoin's LWMA DAA)

name: Dpowcoin build

on:
  push:
    branches:
      - '**'
    tags-ignore:
      - '**'
  pull_request:
  workflow_dispatch:

concurrency:
  group: dpowcoin-build-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  build-ubuntu:
    name: Ubuntu 24.04 (cmake, gcc)
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      MAKEFLAGS: -j4
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-ubuntu-24.04-${{ github.sha }}
          restore-keys: |
            ccache-ubuntu-24.04-

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build pkg-config ccache \
            libboost-dev libevent-dev libsqlite3-dev \
            libssl-dev libdb5.3++-dev systemtap-sdt-dev \
            python3

      - name: Configure (cmake)
        run: |
          cmake -B build -S . -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_GUI=OFF \
            -DBUILD_BENCH=OFF \
            -DBUILD_FUZZ_BINARY=OFF \
            -DBUILD_TESTS=ON \
            -DENABLE_WALLET=ON \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Build
        run: cmake --build build -j"$(nproc)"

      - name: Verify Dual PoW symbols
        run: |
          # The dpowcoin_crypto_dualpow archive must export both PoW hashes.
          ar t build/src/crypto/libdpowcoin_crypto_dualpow.a | sort
          nm -A build/src/crypto/libdpowcoin_crypto_dualpow.a 2>/dev/null \
            | grep -E "yespower_tls|argon2id_hash_raw" \
            | head -n 5
          echo "OK: yespower + argon2id linked into static lib"

      - name: Verify daemon version
        run: |
          ./build/bin/dpowcoind --version | head -n 3
          ./build/bin/dpowcoin-cli --version | head -n 1
          ./build/bin/dpowcoin-tx  --version | head -n 1

      - name: Run curated unit tests
        # Upstream pow_tests target Bitcoin's 2016-block retargeting and
        # are not meaningful for Dpowcoin's LWMA difficulty algorithm.
        run: |
          cd build
          ctest --output-on-failure -j"$(nproc)" \
            -E '^pow_tests$' \
            --timeout 600
