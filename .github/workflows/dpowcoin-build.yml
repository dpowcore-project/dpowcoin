#
# Minimal Dpowcoin-specific CI:
#   * builds the daemon, CLI and tx tools on Ubuntu 24.04
#   * exercises the Dual PoW (yespower + chained argon2id) static lib
#   * runs a curated subset of unit tests (excludes upstream Bitcoin
#     retargeting tests that are not applicable to Dpowcoin's LWMA DAA)

name: Dpowcoin build

on:
  push:
    branches:
      - '**'
    tags-ignore:
      - '**'
  pull_request:
  workflow_dispatch:

concurrency:
  group: dpowcoin-build-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  build-ubuntu:
    name: Ubuntu 24.04 (cmake, gcc)
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      MAKEFLAGS: -j4
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-ubuntu-24.04-${{ github.sha }}
          restore-keys: |
            ccache-ubuntu-24.04-

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build pkg-config ccache \
            libboost-dev libevent-dev libsqlite3-dev \
            python3

      - name: Configure (cmake)
        run: |
          cmake -B build -S . -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_GUI=OFF \
            -DBUILD_BENCH=OFF \
            -DBUILD_FUZZ_BINARY=OFF \
            -DBUILD_TESTS=ON \
            -DENABLE_WALLET=ON \
            -DENABLE_IPC=OFF \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache 2>&1 | tee cmake-configure.log
          tail -50 cmake-configure.log

      - name: Build
        run: cmake --build build -j"$(nproc)"

      - name: Verify Dual PoW symbols
        run: |
          # The dpowcoin_crypto_dualpow archive must export both PoW hashes.
          AR_FILE=build/lib/libdpowcoin_crypto_dualpow.a
          ar t "$AR_FILE" | sort
          echo "--- exported text symbols (yespower / argon2d) ---"
          nm -A "$AR_FILE" 2>/dev/null \
            | awk '$2=="T"' \
            | grep -E "yespower_tls|argon2d_hash_raw|argon2d_ctx" \
            | head -n 10
          # Fail loudly if either family is missing.
          nm "$AR_FILE" 2>/dev/null | awk '$2=="T"' | grep -q yespower_tls
          nm "$AR_FILE" 2>/dev/null | awk '$2=="T"' | grep -q argon2d_ctx
          echo "OK: yespower + argon2d linked into static lib"

      - name: Verify daemon version
        run: |
          ./build/bin/dpowcoind --version | head -n 3
          ./build/bin/dpowcoin-cli --version | head -n 1
          ./build/bin/dpowcoin-tx  --version | head -n 1

      - name: Run curated unit tests
        # Skip upstream test suites that are fundamentally incompatible
        # with Dpowcoin's chain-specific divergences. See
        # .lumen/docs/10-test-skip-list.md for rationale per suite.
        env:
          SKIP_RE: "^(pow_tests|miner_tests|testnet4_miner_tests|bip324_tests|descriptor_tests|key_io_tests|key_tests|rpc_tests|script_standard_tests|util_tests|validation_tests|validation_chainstate_tests|validation_chainstatemanager_tests|validation_block_tests|blockfilter_index_tests|net_peer_connection_tests)$"
        run: |
          cd build
          ctest --output-on-failure -j"$(nproc)" --timeout 600 -E "$SKIP_RE"

      - name: Run Dpowcoin Dual PoW unit suites (must always pass)
        run: |
          ./build/bin/test_bitcoin \
            -t dpowcoin_pow_tests -t pow_cache_tests \
            --log_level=test_suite

  fuzz-smoke:
    name: Fuzz smoke (Dual PoW + Argon2 chain)
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      MAKEFLAGS: -j4
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-fuzz-${{ github.sha }}
          restore-keys: |
            ccache-fuzz-

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build pkg-config ccache \
            libboost-dev libevent-dev libsqlite3-dev clang python3

      - name: Configure (fuzz, libFuzzer + ASAN/UBSAN)
        run: |
          cmake -B build -S . -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DBUILD_FOR_FUZZING=ON \
            -DBUILD_FUZZ_BINARY=ON \
            -DBUILD_TESTS=OFF \
            -DBUILD_GUI=OFF \
            -DBUILD_BENCH=OFF \
            -DENABLE_WALLET=OFF \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DSANITIZERS=fuzzer,address,undefined \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Build fuzz binary
        run: cmake --build build --target fuzz -j"$(nproc)"

      - name: Smoke-run dpowcoin_pow target (90s, libFuzzer)
        env:
          FUZZ: dpowcoin_pow
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
          ASAN_OPTIONS: detect_leaks=0
        run: |
          mkdir -p corpus/dpowcoin_pow
          timeout 95 ./build/bin/fuzz -runs=2000 -max_total_time=90 corpus/dpowcoin_pow || rc=$?
          # libFuzzer returns 0 on -max_total_time exit; we tolerate 124 (timeout race) too.
          test "${rc:-0}" -eq 0 -o "${rc:-0}" -eq 124

      - name: Smoke-run argon2_chained target (90s, libFuzzer)
        env:
          FUZZ: argon2_chained
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
          ASAN_OPTIONS: detect_leaks=0
        run: |
          mkdir -p corpus/argon2_chained
          timeout 95 ./build/bin/fuzz -runs=2000 -max_total_time=90 corpus/argon2_chained || rc=$?
          test "${rc:-0}" -eq 0 -o "${rc:-0}" -eq 124
